<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amoeba Soup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const TENSION = 8; // Catmull-Rom handle divisor: lower = rounder/loopier, higher = tighter

const params  = new URLSearchParams(location.search);
const INIT_N   = Math.max(1, Math.min(200, parseInt(params.get('n'), 10) || 10));
const SPEED_MUL = Math.max(0.1, Math.min(20, parseFloat(params.get('speed')) || 1));
const PREDATION = params.get('predation') === 'true';

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function sineNoise(phases, t) {
  let v = 0;
  for (const [freq, amp, phase] of phases) {
    v += Math.sin(t * freq + phase) * amp;
  }
  return v;
}

function makePhases(n, targetAmp) {
  const raw = Array.from({ length: n }, () => ({
    freq:  0.3 + Math.random() * 1.4,
    amp:   0.4 + Math.random() * 0.6,
    phase: Math.random() * Math.PI * 2,
  }));
  const total = raw.reduce((s, p) => s + p.amp, 0);
  return raw.map(p => [p.freq, p.amp / total * targetAmp, p.phase]);
}

class Amoeba {
  constructor(sizeT = Math.random()) {
    const minDim = Math.min(W, H);
    this.baseR = minDim * (0.04 + sizeT * 0.16);

    this.x = this.baseR + Math.random() * (W - 2 * this.baseR);
    this.y = this.baseR + Math.random() * (H - 2 * this.baseR);

    this.speed = Math.max(W, H) / (30 + Math.random() * 20) * SPEED_MUL;
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * this.speed;
    this.vy = Math.sin(angle) * this.speed;

    this.age = Math.random() * 200;

    this.N   = 8 + Math.floor(Math.random() * 4);
    this.hue = Math.floor(Math.random() * 360);

    this.rPhases    = Array.from({ length: this.N }, () => makePhases(4, 0.55));
    this.aPhases    = Array.from({ length: this.N }, () => makePhases(2, 0.12));
    this.turnPhases = makePhases(3, 1);

    this.margin = 10;

    this.swallowedBy   = null; // reference to swallowing amoeba, or null
    this._capturedDist = 0;   // maxDist at moment of capture, tightens each frame
    this.opacity       = 1;   // 0→1 fade-in for newly spawned amoebas
    this._pendingAreaGain = 0; // r² units still to be grown (mode 2)
    this._growTarget      = this.baseR;
    this._growRate        = 0;
  }

  update(dt) {
    this.age += dt;
    if (this.opacity < 1) this.opacity = Math.min(1, this.opacity + dt / 2);
    if (this.baseR < this._growTarget) {
      const prev = this.baseR;
      this.baseR = Math.min(this._growTarget, this.baseR + this._growRate * dt);
      this._pendingAreaGain = Math.max(0, this._pendingAreaGain - (this.baseR ** 2 - prev ** 2));
    }

    const turnRate = sineNoise(this.turnPhases, this.age * 0.22) * 0.45;
    const heading  = Math.atan2(this.vy, this.vx) + turnRate * dt;
    this.vx = Math.cos(heading) * this.speed;
    this.vy = Math.sin(heading) * this.speed;

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    if (this.swallowedBy) {
      // Tighten the leash from capture distance toward the settled target each frame
      const sw = this.swallowedBy;
      const target = sw.baseR * 0.35;
      this._capturedDist = Math.max(target, this._capturedDist - sw.baseR * 0.08 * dt);
      const maxDist = this._capturedDist;

      const dx = this.x - sw.x;
      const dy = this.y - sw.y;
      const dist = Math.hypot(dx, dy);
      if (dist > maxDist && dist > 0) {
        this.x = sw.x + (dx / dist) * maxDist;
        this.y = sw.y + (dy / dist) * maxDist;
        const outward = this.vx * (dx / dist) + this.vy * (dy / dist);
        if (outward > 0) {
          this.vx -= outward * (dx / dist);
          this.vy -= outward * (dy / dist);
        }
      }
    } else {
      // Bounce threshold is low (0.3×) so the centre gets close to the wall
      // and squishing has time to show before the direction reverses.
      const r = this.baseR * 0.3;
      if (this.x < r && this.vx < 0) {
        this.vx = Math.abs(this.vx) * (0.9 + Math.random() * 0.2);
        this.vy += (Math.random() - 0.5) * this.speed * 0.3;
      }
      if (this.x > W - r && this.vx > 0) {
        this.vx = -Math.abs(this.vx) * (0.9 + Math.random() * 0.2);
        this.vy += (Math.random() - 0.5) * this.speed * 0.3;
      }
      if (this.y < r && this.vy < 0) {
        this.vy = Math.abs(this.vy) * (0.9 + Math.random() * 0.2);
        this.vx += (Math.random() - 0.5) * this.speed * 0.3;
      }
      if (this.y > H - r && this.vy > 0) {
        this.vy = -Math.abs(this.vy) * (0.9 + Math.random() * 0.2);
        this.vx += (Math.random() - 0.5) * this.speed * 0.3;
      }

      const spd = Math.hypot(this.vx, this.vy);
      if (spd > 0) {
        this.vx = (this.vx / spd) * this.speed;
        this.vy = (this.vy / spd) * this.speed;
      }

      this.x = Math.max(r, Math.min(W - r, this.x));
      this.y = Math.max(r, Math.min(H - r, this.y));
    }
  }

  _points(t) {
    const pts = [];
    for (let i = 0; i < this.N; i++) {
      const baseAngle = (i / this.N) * Math.PI * 2;
      const angle = baseAngle + sineNoise(this.aPhases[i], t * 0.35);
      const r     = this.baseR  * (1 + sineNoise(this.rPhases[i], t * 0.55));
      const m  = this.margin;
      const px = Math.max(m, Math.min(W - m, this.x + Math.cos(angle) * r));
      const py = Math.max(m, Math.min(H - m, this.y + Math.sin(angle) * r));
      pts.push([px, py]);
    }
    return pts;
  }

  _buildPath(pts) {
    const n = pts.length;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n];
      const p1 = pts[i];
      const p2 = pts[(i + 1) % n];
      const p3 = pts[(i + 2) % n];
      if (i === 0) ctx.moveTo(p1[0], p1[1]);
      const cp1x = p1[0] + (p2[0] - p0[0]) / TENSION;
      const cp1y = p1[1] + (p2[1] - p0[1]) / TENSION;
      const cp2x = p2[0] - (p3[0] - p1[0]) / TENSION;
      const cp2y = p2[1] - (p3[1] - p1[1]) / TENSION;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
    }
    ctx.closePath();
  }

  draw(t) {
    const pts = this._points(t);
    this._buildPath(pts);

    const o = this.opacity;
    if (this.swallowedBy) {
      ctx.fillStyle = `hsla(${this.hue}, 65%, 20%, ${0.60 * o})`;
      ctx.fill();
    } else {
      ctx.fillStyle   = `hsla(${this.hue}, 65%, 60%, ${0.30 * o})`;
      ctx.fill();
      ctx.strokeStyle = `hsla(${this.hue}, 75%, 78%, ${0.55 * o})`;
      ctx.lineWidth   = 2;
      ctx.stroke();
    }
  }
}

function swallowDepth(a) {
  let d = 0;
  while (a.swallowedBy) { d++; a = a.swallowedBy; }
  return d;
}

// Uses ctx path hit-testing (no draw) to detect when a smaller amoeba is fully
// inside a larger one. Fully general: swallowed amoebas can swallow others.
function checkSwallowing(amoebas, t) {
  for (const b of amoebas) {
    for (const a of amoebas) {
      if (a === b || b.swallowedBy) continue;

      a._buildPath(a._points(t));
      const ptsB = b._points(t);
      if (ctx.isPointInPath(b.x, b.y) && ptsB.every(([px, py]) => ctx.isPointInPath(px, py))) {
        b.swallowedBy   = a;
        b._capturedDist = Math.hypot(b.x - a.x, b.y - a.y);
        a._pendingAreaGain += b.baseR ** 2;
        a._growTarget = Math.sqrt(a.baseR ** 2 + a._pendingAreaGain);
        a._growRate   = (a._growTarget - a.baseR);
        break;
      }
    }
  }
}

// Stratified sampling: one random draw per evenly-spaced bucket guarantees full size range
const sizeBuckets = Array.from({ length: INIT_N }, (_, i) => (i + Math.random()) / INIT_N)
  .sort(() => Math.random() - 0.5);
const amoebas = sizeBuckets.map(t => new Amoeba(t));

let fps = 0;
let diagnosticsOn = false;

window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); diagnosticsOn = !diagnosticsOn; }
});

function drawHUD() {
  const free  = amoebas.filter(a => !a.swallowedBy).length;
  const total = amoebas.length;
  const lines = [
    `${Math.round(fps)} fps`,
    `${free} / ${total} amoebas`,
  ];
  ctx.save();
  ctx.font = '13px monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  const pad = 14;
  const lineH = 18;
  lines.forEach((line, i) => {
    const y = H - pad - (lines.length - 1 - i) * lineH;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillText(line, W - pad + 2, y + 2);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(line, W - pad, y);
  });
  ctx.restore();
}

function drawAmoebaDiagnostics(a, t) {
  if (a.swallowedBy) return;
  const pts = a._points(t);

  // Control points
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,100,0.85)';
  for (const [px, py] of pts) {
    ctx.beginPath();
    ctx.arc(px, py, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Label lines
  const lines = [
    `R:${Math.round(a.baseR)}  N:${a.N}`,
    `spd:${Math.round(a.speed)}  hue:${a.hue}`,
    ...(a.opacity < 1 ? [`fade:${a.opacity.toFixed(2)}`] : []),
  ];
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const lineH = 14;
  const totalH = lines.length * lineH;
  lines.forEach((line, i) => {
    const ly = a.y - totalH / 2 + i * lineH + lineH / 2;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillText(line, a.x + 1, ly + 1);
    ctx.fillStyle = 'rgba(255,255,180,0.95)';
    ctx.fillText(line, a.x, ly);
  });
  ctx.restore();
}

let lastTs = 0;
function frame(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  const t = ts / 1000;
  fps += (1 / dt - fps) * 0.1; // exponential moving average

  ctx.clearRect(0, 0, W, H);

  if (PREDATION) checkSwallowing(amoebas, t);

  // Innermost amoebas draw first; stable index tiebreak prevents flicker from order swaps
  const sorted = amoebas
    .map((a, i) => ({ a, i }))
    .sort((x, y) => swallowDepth(y.a) - swallowDepth(x.a) || x.i - y.i)
    .map(({ a }) => a);

  for (const a of sorted) {
    a.update(dt);
    a.draw(t);
  }

  if (diagnosticsOn) {
    for (const a of sorted) drawAmoebaDiagnostics(a, t);
    drawHUD();
  }
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
