<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amoeba Soup</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Amoeba Soup">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const TENSION       = 8;
const MARGIN        = 10;
const P             = 10;  // skeleton control points per amoeba
const ENDGAME_FLASH = 10;  // seconds of edge-flashing before push
const ENDGAME_PUSH  = 5;   // seconds of reverse-spring push
const ENDGAME_DRIFT = 10;  // seconds of free drift before predation resumes

const params    = new URLSearchParams(location.search);
const INIT_N    = Math.max(1, Math.min(200, parseInt(params.get('n'), 10) || 20));
const SPEED_MUL = Math.max(0.1, Math.min(20, parseFloat(params.get('speed')) || 1));
const PREDATION = params.get('predation') !== 'false';

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Scale initial radii so combined area ≈ 25% of canvas
const _avgSqCoeff = 0.04**2 + 0.04*0.16 + 0.16**2/3; // E[(0.04+0.16t)²], t~U[0,1]
const SIZE_SCALE  = Math.sqrt(0.25 * W * H / (INIT_N * Math.PI * Math.min(W,H)**2 * _avgSqCoeff));

function sineNoise(phases, t) {
  let v = 0;
  for (const [freq, amp, phase] of phases) {
    v += Math.sin(t * freq + phase) * amp;
  }
  return v;
}

function makePhases(n, targetAmp) {
  const raw = Array.from({ length: n }, () => ({
    freq:  0.3 + Math.random() * 1.4,
    amp:   0.4 + Math.random() * 0.6,
    phase: Math.random() * Math.PI * 2,
  }));
  const total = raw.reduce((s, p) => s + p.amp, 0);
  return raw.map(p => [p.freq, p.amp / total * targetAmp, p.phase]);
}

class Amoeba {
  constructor(sizeT = Math.random()) {
    const minDim = Math.min(W, H);
    this.baseR = minDim * SIZE_SCALE * (0.04 + sizeT * 0.16);

    this.x = this.baseR + Math.random() * (W - 2 * this.baseR);
    this.y = this.baseR + Math.random() * (H - 2 * this.baseR);

    this._baseSpeed = Math.max(W, H) / (30 + Math.random() * 20) * SPEED_MUL;
    this.speed = this._baseSpeed;
    const angle = Math.random() * Math.PI * 2;
    this.vx = Math.cos(angle) * this.speed;
    this.vy = Math.sin(angle) * this.speed;

    this.age = Math.random() * 200;
    this.hue = Math.floor(Math.random() * 360);

    this.rPhases    = Array.from({ length: P }, () => makePhases(4, 0.55));
    this.aPhases    = Array.from({ length: P }, () => makePhases(2, 0.12));
    this.turnPhases = makePhases(3, 0.45); // pre-scaled; no * 0.45 needed at runtime

    this._initialBaseR = this.baseR;
    this.swallowedBy   = null;
    this._capturedDist = 0;
    this._growTarget   = this.baseR;
    this._growRate     = 0;
    this.depth         = 0;

    // Pre-allocate _pts so buildPoints() mutates in-place each frame
    this._pts  = Array.from({ length: P }, () => [0, 0]);
    this._path = null;

    // Cache colour strings — hue never changes so no need to rebuild each frame
    this.fillCaptured = `hsla(${this.hue}, 65%, 20%, 0.60)`;
    this.fillFree     = `hsla(${this.hue}, 65%, 60%, 0.30)`;
    this.strokeFree   = `hsla(${this.hue}, 75%, 78%, 0.55)`;
  }

  update(dt) {
    this.age += dt * globalSpeedMult;

    if (this.baseR < this._growTarget) {
      this.baseR = Math.min(this._growTarget, this.baseR + this._growRate * dt);
    } else if (this.baseR > this._growTarget) {
      this.baseR += (this._growTarget - this.baseR) * Math.min(1, 5 * dt * globalSpeedMult);
    }

    if (this.speed > this._baseSpeed) {
      this.speed += (this._baseSpeed - this.speed) * Math.min(1, 1.5 * dt);
    }

    const heading = Math.atan2(this.vy, this.vx) + sineNoise(this.turnPhases, this.age * 0.22) * dt;
    this.vx = Math.cos(heading) * this.speed;
    this.vy = Math.sin(heading) * this.speed;

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    if (this.swallowedBy) {
      const sw = this.swallowedBy;
      if (endgamePhase === 'push') {
        // Reverse spring: enforce minimum distance, growing outward
        this._capturedDist += sw.baseR * 0.3 * dt;
        const dx = this.x - sw.x, dy = this.y - sw.y;
        const dist = Math.hypot(dx, dy);
        if (dist < this._capturedDist && dist > 0) {
          this.x = sw.x + (dx / dist) * this._capturedDist;
          this.y = sw.y + (dy / dist) * this._capturedDist;
          const inward = this.vx * (-dx / dist) + this.vy * (-dy / dist);
          if (inward > 0) { this.vx += inward * (dx / dist); this.vy += inward * (dy / dist); }
        }
        if (this._capturedDist > sw.baseR) {
          const r = this._capturedBaseR;
          sw._growTarget = Math.sqrt(Math.max(0, sw._growTarget ** 2 - r ** 2));
          this.swallowedBy = null;
        }
      } else {
        this._capturedDist = Math.max(sw.baseR * 0.35, this._capturedDist - sw.baseR * 0.08 * dt);
        const dx = this.x - sw.x, dy = this.y - sw.y;
        const dist = Math.hypot(dx, dy);
        if (dist > this._capturedDist && dist > 0) {
          this.x = sw.x + (dx / dist) * this._capturedDist;
          this.y = sw.y + (dy / dist) * this._capturedDist;
          const outward = this.vx * (dx / dist) + this.vy * (dy / dist);
          if (outward > 0) {
            this.vx -= outward * (dx / dist);
            this.vy -= outward * (dy / dist);
          }
        }
      }
    } else {
      if (this !== dragTarget) {
        // Bounce threshold 0.3× lets the body visibly squish before reversing
        const r = this.baseR * 0.3;
        if (this.x < r         && this.vx < 0) { this.vx =  Math.abs(this.vx) * (0.9 + Math.random() * 0.2); this.vy += (Math.random() - 0.5) * this.speed * 0.3; }
        if (this.x > W - r     && this.vx > 0) { this.vx = -Math.abs(this.vx) * (0.9 + Math.random() * 0.2); this.vy += (Math.random() - 0.5) * this.speed * 0.3; }
        if (this.y < r         && this.vy < 0) { this.vy =  Math.abs(this.vy) * (0.9 + Math.random() * 0.2); this.vx += (Math.random() - 0.5) * this.speed * 0.3; }
        if (this.y > H - r     && this.vy > 0) { this.vy = -Math.abs(this.vy) * (0.9 + Math.random() * 0.2); this.vx += (Math.random() - 0.5) * this.speed * 0.3; }

        const spd = Math.hypot(this.vx, this.vy);
        if (spd > 0) { this.vx = (this.vx / spd) * this.speed; this.vy = (this.vy / spd) * this.speed; }

        this.x = Math.max(r, Math.min(W - r, this.x));
        this.y = Math.max(r, Math.min(H - r, this.y));
      }
    }
  }

  // Computes skeleton points and Path2D once per frame; _pts mutated in-place
  buildPoints(t) {
    const pts = this._pts;
    for (let i = 0; i < P; i++) {
      const angle = (i / P) * Math.PI * 2 + sineNoise(this.aPhases[i], t * 0.35);
      const r     = this.baseR * (1 + sineNoise(this.rPhases[i], t * 0.55));
      pts[i][0] = Math.max(MARGIN, Math.min(W - MARGIN, this.x + Math.cos(angle) * r));
      pts[i][1] = Math.max(MARGIN, Math.min(H - MARGIN, this.y + Math.sin(angle) * r));
    }

    const n = P;
    const path = new Path2D();
    for (let i = 0; i < n; i++) {
      const p0 = pts[(i - 1 + n) % n], p1 = pts[i];
      const p2 = pts[(i + 1) % n],     p3 = pts[(i + 2) % n];
      if (i === 0) path.moveTo(p1[0], p1[1]);
      path.bezierCurveTo(
        p1[0] + (p2[0] - p0[0]) / TENSION, p1[1] + (p2[1] - p0[1]) / TENSION,
        p2[0] - (p3[0] - p1[0]) / TENSION, p2[1] - (p3[1] - p1[1]) / TENSION,
        p2[0], p2[1],
      );
    }
    path.closePath();
    this._path = path;
  }

  draw() {
    if (this.swallowedBy) {
      ctx.fillStyle = this.fillCaptured;
      ctx.fill(this._path);
      const showStroke = endgamePhase === 'push' ||
        (endgamePhase === 'flash' && Math.sin(performance.now() / 1000 * Math.PI * 6 + this.hue) > 0);
      if (showStroke) {
        ctx.strokeStyle = this.strokeFree;
        ctx.lineWidth   = 2;
        ctx.stroke(this._path);
      }
    } else {
      ctx.fillStyle   = this.fillFree;
      ctx.fill(this._path);
      ctx.strokeStyle = this.strokeFree;
      ctx.lineWidth   = 2;
      ctx.stroke(this._path);
    }
  }
}

// Uses Path2D hit-testing to detect when a smaller amoeba is fully inside a larger one.
// Paths are pre-built once per frame so no redundant _buildPath calls here.
// Swallowed amoebas can swallow others, supporting chains.
function checkSwallowing() {
  for (const b of amoebas) {
    if (b.swallowedBy) continue;
    for (const a of amoebas) {
      if (a === b) continue;
      if (ctx.isPointInPath(a._path, b.x, b.y) &&
          b._pts.every(([px, py]) => ctx.isPointInPath(a._path, px, py))) {
        b.swallowedBy    = a;
        b._capturedDist  = Math.hypot(b.x - a.x, b.y - a.y);
        b._capturedBaseR = b.baseR;
        a._growTarget    = Math.sqrt(a._growTarget ** 2 + b.baseR ** 2);
        a._growRate      = a._growTarget - a.baseR;
        break;
      }
    }
  }
}

// Stratified sampling: one random draw per evenly-spaced bucket guarantees full size range
const amoebas  = Array.from({ length: INIT_N }, (_, i) => new Amoeba((i + Math.random()) / INIT_N));
const sortBuf  = amoebas.map((a, i) => ({ a, i })); // pre-allocated; sorted in-place each frame

let endgamePhase    = 'idle'; // 'idle' | 'flash' | 'push' | 'drift'
let endgameTimer    = 0;
let globalSpeedMult = SPEED_MUL;
let simTime         = 0;
let dragTarget      = null;
let dragMx = 0, dragMy = 0;
let dragOffsetX = 0, dragOffsetY = 0;
let dragHistory = [];

canvas.addEventListener('mousedown', e => {
  const mx = e.clientX, my = e.clientY;
  let best = null;
  for (const a of amoebas) {
    if (a.swallowedBy) continue;
    if (ctx.isPointInPath(a._path, mx, my)) {
      if (!best || a.baseR < best.baseR) best = a;
    }
  }
  if (best) {
    dragTarget = best;
    dragMx = mx; dragMy = my;
    dragOffsetX = best.x - mx;
    dragOffsetY = best.y - my;
    dragHistory = [{ x: mx, y: my, t: performance.now() }];
    e.preventDefault();
  }
});

canvas.addEventListener('mousemove', e => {
  if (!dragTarget) return;
  dragMx = e.clientX;
  dragMy = e.clientY;
  dragHistory.push({ x: dragMx, y: dragMy, t: performance.now() });
  if (dragHistory.length > 15) dragHistory.shift();
});

window.addEventListener('mouseup', () => {
  if (!dragTarget) return;
  const now = performance.now();
  const recent = dragHistory.filter(h => now - h.t < 150);
  if (recent.length >= 2) {
    const first = recent[0], last = recent[recent.length - 1];
    const dx = last.x - first.x, dy = last.y - first.y;
    const d = Math.hypot(dx, dy);
    const throwDt = (last.t - first.t) / 1000;
    if (d > 2 && throwDt > 0) {
      const throwSpd = Math.min(d / throwDt, dragTarget._baseSpeed * 5);
      dragTarget.speed = throwSpd;
      dragTarget.vx = (dx / d) * throwSpd;
      dragTarget.vy = (dy / d) * throwSpd;
    }
  }
  dragTarget = null;
  dragHistory = [];
});

window.addEventListener('keydown', e => {
  let factor = 0;
  if (e.key === '+' || e.key === '=') factor = 1.25;
  else if (e.key === '-')             factor = 0.8;
  if (factor) {
    globalSpeedMult *= factor;
    for (const a of amoebas) { a._baseSpeed *= factor; a.speed *= factor; }
  }
});

let lastTs = 0;
function frame(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  simTime += dt * globalSpeedMult;

  ctx.clearRect(0, 0, W, H);

  if (dragTarget) { dragTarget.x = dragMx + dragOffsetX; dragTarget.y = dragMy + dragOffsetY; }
  for (const a of amoebas) a.buildPoints(simTime);

  if (PREDATION) {
    if (endgamePhase === 'idle') {
      const freeCount = amoebas.reduce((n, a) => n + (a.swallowedBy ? 0 : 1), 0);
      if (freeCount === 1 && amoebas.length > 1) { endgamePhase = 'flash'; endgameTimer = 0; }
      else checkSwallowing();
    } else {
      endgameTimer += dt;
      if (endgamePhase === 'flash' && endgameTimer >= ENDGAME_FLASH) {
        endgamePhase = 'push'; endgameTimer = 0;
      } else if (endgamePhase === 'push' && endgameTimer >= ENDGAME_PUSH && amoebas.every(a => !a.swallowedBy)) {
        endgamePhase = 'drift'; endgameTimer = 0;
      } else if (endgamePhase === 'drift' && endgameTimer >= ENDGAME_DRIFT) {
        for (const a of amoebas) {
          const delta = a.baseR - a._initialBaseR;
          if (Math.abs(delta) > 0.5) console.warn(`size drift: ${a._initialBaseR.toFixed(1)} → ${a.baseR.toFixed(1)} (Δ${delta.toFixed(2)})`);
        }
        endgamePhase = 'idle';
      }
    }
  }

  for (const a of amoebas) {
    let d = 0, b = a;
    while (b.swallowedBy) { d++; b = b.swallowedBy; }
    a.depth = d;
  }

  // Innermost amoebas draw first; stable index tiebreak prevents flicker
  sortBuf.sort((x, y) => y.a.depth - x.a.depth || x.i - y.i);

  for (const { a } of sortBuf) { a.update(dt); a.draw(); }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
